{% extends 'base.html' %}

{% block contenido %}
<div class="container mt-4">

<h2 class="mb-3">Tipos de Artículos</h2>

<a href="{% url 'crear_tipo' %}" class="btn btn-primary mb-3">
    Nuevo Tipo
</a>

<table class="table table-striped table-bordered">
<thead class="table-dark">
<tr>
    <th>ID</th>
    <th>Descripción</th>
    <th>Estado</th>
    <th>Acciones</th>
</tr>
</thead>

<tbody>
{% for tipo in tipos %}
<tr>
    <td>{{ tipo.id }}</td>
    <td>{{ tipo.descripcion }}</td>

    <td>
        {% if tipo.estado %}
            <span class="badge bg-success">Activo</span>
        {% else %}
            <span class="badge bg-danger">Inactivo</span>
        {% endif %}
    </td>

    <td>

        <a href="{% url 'editar_tipo' tipo.id %}" class="btn btn-warning btn-sm">
            Editar
        </a>

        <a href="{% url 'eliminar_tipo' tipo.id %}" 
           class="btn btn-danger btn-sm"
           onclick="return confirm('¿Seguro que desea eliminar este registro?')">
            Eliminar
        </a>

    </td>

</tr>
{% endfor %}
</tbody>

</table>

</div>
{% endblock %}
