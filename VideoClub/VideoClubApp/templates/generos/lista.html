{% extends 'base.html' %}

{% block contenido %}
<div class="container mt-4">

<h2>Géneros</h2>

<a href="{% url 'crear_genero' %}" class="btn btn-primary mb-3">
Nuevo Género
</a>

<table class="table table-striped table-bordered">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Descripción</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for genero in generos %}
<tr>

<td>{{ genero.id }}</td>
<td>{{ genero.descripcion }}</td>

<td>
{% if genero.estado %}
<span class="badge bg-success">Activo</span>
{% else %}
<span class="badge bg-danger">Inactivo</span>
{% endif %}
</td>

<td>

<a href="{% url 'editar_genero' genero.id %}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="{% url 'eliminar_genero' genero.id %}"
class="btn btn-danger btn-sm"
onclick="return confirm('¿Seguro que desea eliminar?')">
Eliminar
</a>

</td>

</tr>
{% endfor %}

</tbody>

</table>

</div>
{% endblock %}
