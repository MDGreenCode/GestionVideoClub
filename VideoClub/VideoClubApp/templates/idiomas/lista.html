{% extends 'base.html' %}

{% block contenido %}
<div class="container mt-4">

<h2>Idiomas</h2>

<a href="{% url 'crear_idioma' %}" class="btn btn-primary mb-3">
Nuevo Idioma
</a>

<table class="table table-striped table-bordered">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Descripción</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for idioma in idiomas %}
<tr>

<td>{{ idioma.id }}</td>
<td>{{ idioma.descripcion }}</td>

<td>
{% if idioma.estado %}
<span class="badge bg-success">Activo</span>
{% else %}
<span class="badge bg-danger">Inactivo</span>
{% endif %}
</td>

<td>

<a href="{% url 'editar_idioma' idioma.id %}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="{% url 'eliminar_idioma' idioma.id %}"
class="btn btn-danger btn-sm"
onclick="return confirm('¿Seguro que desea eliminar?')">
Eliminar
</a>

</td>

</tr>
{% endfor %}

</tbody>

</table>

</div>
{% endblock %}
